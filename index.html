<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joya Chat</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
    font-family:sans-serif;
    background:#e5ddd5;
    margin:0;
    display:flex;
    flex-direction:column;
    height:100vh;
}
header{
    background:#075e54;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
}
#chat-box{
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}
.msg{
    background:white;
    padding:10px;
    border-radius:10px;
    max-width:80%;
}
.input-area{
    display:flex;
    padding:10px;
    background:#f0f0f0;
}
input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:20px;
}
button{
    margin-right:10px;
    padding:10px 20px;
    border:none;
    background:#128c7e;
    color:white;
    border-radius:20px;
}
</style>
</head>

<body>

<header>Joya Chat</header>

<div id="chat-box"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="پیام بنویس...">
    <button onclick="sendMessage()">ارسال</button>
</div>

<script>

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "joya-chat.firebaseapp.com",
    databaseURL: "https://joya-chat-default-rtdb.firebaseio.com",
    projectId: "joya-chat",
    storageBucket: "joya-chat.appspot.com",
    messagingSenderId: "252583579907",
    appId: "1:252583579907:web:9e2ca53215806c9a334a1d"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

function sendMessage() {

    const input = document.getElementById("msgInput");

    if(input.value.trim() !== ""){

        db.ref("messages").push({
            text: input.value
        });

        input.value = "";
    }
}

db.ref("messages").on("child_added", function(snapshot){

    const data = snapshot.val();

    const div = document.createElement("div");

    div.classList.add("msg");

    div.innerText = data.text;

    document.getElementById("chat-box").appendChild(div);
});

</script>

</body>
</html>
