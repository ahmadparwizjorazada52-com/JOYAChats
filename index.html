
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joya Chat | چت زنده</title>
    <style>
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #075e54; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: white; padding: 10px; border-radius: 10px; max-width: 80%; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .my-msg { background: #dcf8c6; align-self: flex-end; }
        .input-area { display: flex; padding: 10px; background: #f0f0f0; gap: 5px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; outline: none; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>

<header>Joya Chat</header>

<div id="chat-box">
    <div class="msg">سلام! به جویا چت خوش آمدی.</div>
    <div class="msg my-msg">پیام خود را اینجا بنویس...</div>
</div>

<div class="input-area">
    <input type="text" id="messageInput" placeholder="پیامی بنویسید...">
    <button onclick="sendMessage()">ارسال</button>
</div>

<script>
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const chatBox = document.getElementById('chat-box');
        
        if (input.value.trim() !== "") {
            const newMsg = document.createElement('div');
            newMsg.classList.add('msg', 'my-msg');
            newMsg.innerText = input.value;
            chatBox.appendChild(newMsg);
            
            input.value = ""; // کادر را خالی کن
            chatBox.scrollTop = chatBox.scrollHeight; // اسکرول به پایین
        }
    }
</script>

</body>
</html>
